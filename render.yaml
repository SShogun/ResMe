services:
  # Python Backend API (FastAPI)
  - type: web
    name: resme-backend
    env: python
    buildCommand: pip install -r dashboard/backend/requirements.txt
    startCommand: uvicorn dashboard.backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  # Static Frontend (React/Vite)
  - type: web
    name: resme-frontend
    env: static
    buildCommand: cd dashboard/frontend && npm install && npm run build
    staticPublishPath: dashboard/frontend/dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: resme-backend
          property: host
